<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登下校管理システム（独立版）</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
      body { background-color: #e9ecef; font-family: sans-serif; height: 100vh; overflow: hidden; }
      .main-container { height: 95vh; margin-top: 2.5vh; display: flex; flex-direction: column; }
      .header-card { background-color: #0d6efd; color: white; border-radius: 15px; padding: 15px 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
      .app-title { font-size: 1.5rem; font-weight: 700; margin: 0; }
      .clock-area { font-family: monospace; font-size: 1.5rem; font-weight: 500; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 8px; margin-right: 15px; white-space: nowrap; }
      .btn-admin { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
      .btn-admin:hover { background: rgba(255,255,255,0.4); }
      .content-area { flex: 1; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; padding: 20px; }
      #video-area { position: relative; width: 100%; height: 100%; background: #000; border-radius: 12px; overflow: hidden; display: none; align-items: center; justify-content: center; }
      #video-placeholder { width: 100%; height: 100%; background-color: #f8f9fa; border: 2px dashed #dee2e6; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #adb5bd; }
      video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
      .control-panel { display: flex; flex-direction: column; justify-content: center; height: 100%; padding-left: 20px; }
      .btn-action { width: 100%; height: 80px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      .btn-in { background-color: #20c997; border-color: #20c997; color: white; }
      .btn-out { background-color: #fd7e14; border-color: #fd7e14; color: white; }
      .btn-cancel { width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 50px; display: none; }
      .status-badge { font-size: 1.1rem; padding: 15px; border-radius: 12px; background-color: #f8f9fa; color: #6c757d; border: 2px solid #dee2e6; text-align: center; margin-bottom: 20px; }
      .alert-custom { font-size: 1.1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; text-align: center; }
      #canvas { display: none; }
    </style>
  </head>
  <body>
    <audio id="sound-ok" src="ok.mp3" preload="auto"></audio>

    <div class="container main-container">
      <div class="header-card">
        <h1 class="app-title"><i class="bi bi-building-check"></i> 登下校管理システム</h1>
        <div style="display:flex; align-items:center;">
          <div id="clock" class="clock-area">--/--(-) --:--:--</div>
          <button class="btn-admin" onclick="openAdminAuth()" title="管理者メニュー">
            <i class="bi bi-gear-fill"></i>
          </button>
        </div>
      </div>

      <div class="content-area">
        <div class="row h-100">
          <div class="col-8 h-100">
            <div id="video-area">
              <video id="video" playsinline></video>
              <canvas id="canvas"></canvas>
              <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:60%; height:60%; border: 4px solid rgba(255,255,255,0.7); border-radius:10px; pointer-events:none;"></div>
            </div>
            <div id="video-placeholder">
              <i class="bi bi-camera-video-off" style="font-size: 4rem;"></i>
              <p class="mt-3 fs-4">右側のボタンを押してください</p>
            </div>
          </div>

          <div class="col-4 h-100">
            <div class="control-panel">
              <div id="status-indicator" class="status-badge"><i class="bi bi-hand-index-thumb"></i> 待機中</div>
              <div id="message-area" class="mb-4" style="min-height: 60px;">
                <div id="msg-alert" class="alert alert-secondary alert-custom" role="alert">操作を選択してください</div>
              </div>
              <button id="btn-in" class="btn btn-action btn-in" onclick="startScan('登校')"><i class="bi bi-box-arrow-in-right"></i> 登校</button>
              <button id="btn-out" class="btn btn-action btn-out" onclick="startScan('下校')"><i class="bi bi-box-arrow-left"></i> 下校</button>
              <button id="btn-cancel" class="btn btn-secondary btn-cancel mt-2" onclick="resetSystem()"><i class="bi bi-x-circle"></i> キャンセル</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="authModal" class="modal fade" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
          <div class="modal-header bg-dark text-white">
            <h5 class="modal-title">管理者認証</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="password" id="admin-pass" class="form-control mb-3" placeholder="パスワードを入力">
            <button class="btn btn-dark w-100" onclick="checkAdmin()">ログイン</button>
          </div>
        </div>
      </div>
    </div>

    <div id="postModal" class="modal fade" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title"><i class="bi bi-pencil-square"></i> 掲示板に投稿</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="post-form">
              <div class="mb-3"><label class="form-label fw-bold">日付</label><input type="date" id="post-date" class="form-control"></div>
              <div class="mb-3"><label class="form-label fw-bold">メッセージ</label><input type="text" id="post-message" class="form-control" placeholder="例：連絡事項など"></div>
              <div class="mb-3"><label class="form-label fw-bold">添付ファイル (PDF/写真)</label><input type="file" id="post-file" class="form-control"></div>
            </form>
            <div id="post-status" class="text-center mt-2 fw-bold text-danger"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
            <button type="button" class="btn btn-primary" onclick="submitPost()">投稿する</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // ==========================================
      // 【重要】ここに【手順1】でデプロイした新しいGASのURLを貼り付けます！
      // ==========================================
      const GAS_URL = "https://script.google.com/macros/s/AKfycbw1kWKZbLopo4vr1XA4Gi952a-Y3Hlvj5nNiSGZP28DbqZGGDflBTw1KyJaKTc4OfKO/exec";

      function updateClock() {
        const now = new Date();
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const day = days[now.getDay()];
        const h = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock').innerText = `${y}/${m}/${d}(${day}) ${h}:${min}:${s}`;
      }
      setInterval(updateClock, 1000);
      updateClock();

      let authModal = new bootstrap.Modal(document.getElementById('authModal'));
      let postModal = new bootstrap.Modal(document.getElementById('postModal'));

      function openAdminAuth() {
        document.getElementById('admin-pass').value = "";
        authModal.show();
      }

      function checkAdmin() {
        const pass = document.getElementById('admin-pass').value;
        if (pass === "ramen") {
          authModal.hide();
          const today = new Date().toISOString().split('T')[0];
          document.getElementById('post-date').value = today;
          postModal.show();
        } else {
          alert("パスワードが違います");
        }
      }

      function submitPost() {
        const dateStr = document.getElementById('post-date').value;
        const message = document.getElementById('post-message').value;
        const fileInput = document.getElementById('post-file');
        const statusDiv = document.getElementById('post-status');
        if (!message) { alert("メッセージを入力してください"); return; }
        
        statusDiv.innerText = "送信中...";
        
        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const reader = new FileReader();
          reader.onload = function(e) {
            const base64Data = e.target.result.split(',')[1];
            sendToGas({ dateStr, message, fileName: file.name, mimeType: file.type, fileData: base64Data });
          };
          reader.readAsDataURL(file);
        } else {
          sendToGas({ dateStr, message, fileData: null });
        }
      }

      function sendToGas(data) {
        fetch(GAS_URL, {
          method: "POST",
          redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "postBulletin",
            data: data
          })
        })
        .then(res => res.json())
        .then(res => {
          if(res.success) { alert(res.message); postModal.hide(); }
          else { document.getElementById('post-status').innerText = res.message; }
        })
        .catch(err => {
          document.getElementById('post-status').innerText = "通信エラー: " + err.message;
        });
      }

      let video = document.getElementById("video");
      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");
      let currentMode = ""; 
      let isScanning = false;
      let animationId = null;

      const msgAlert = document.getElementById("msg-alert");
      const statusInd = document.getElementById("status-indicator");
      const videoArea = document.getElementById("video-area");
      const placeholder = document.getElementById("video-placeholder");
      const btnCancel = document.getElementById("btn-cancel");

      function startScan(mode) {
        currentMode = mode;
        statusInd.innerHTML = `<strong>【${mode}】</strong>QRをかざしてください`;
        statusInd.style.borderColor = mode === "登校" ? "#20c997" : "#fd7e14";
        msgAlert.innerText = "カメラ起動中...";
        placeholder.style.display = "none";
        videoArea.style.display = "flex";
        btnCancel.style.display = "block";
        document.getElementById("btn-in").disabled = true;
        document.getElementById("btn-out").disabled = true;
        isScanning = true;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
          .then(function(stream) {
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(tick);
            msgAlert.innerText = "読み取り中...";
          })
          .catch(function(err) {
            msgAlert.innerText = "カメラ起動エラー: " + err.message;
            msgAlert.className = "alert alert-danger alert-custom";
            resetSystem();
          });
      }

      function tick() {
        if (!isScanning) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.height = video.videoHeight;
          canvas.width = video.videoWidth;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          let code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code) handleQRCode(code.data);
        }
        animationId = requestAnimationFrame(tick);
      }

      function handleQRCode(data) {
        isScanning = false;
        cancelAnimationFrame(animationId);
        video.pause();
        msgAlert.innerText = "記録中: " + data;
        
        fetch(GAS_URL, {
          method: "POST",
          redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "processAttendance",
            name: data,
            type: currentMode
          })
        })
        .then(res => res.json())
        .then(result => onSuccess(result))
        .catch(err => onFailure(err));
      }

      function onSuccess(result) {
        document.getElementById("sound-ok").play();
        msgAlert.className = result.success ? "alert alert-success alert-custom" : "alert alert-danger alert-custom";
        msgAlert.innerText = result.message;
        setTimeout(resetSystem, 4000);
      }

      function onFailure(err) {
        msgAlert.innerText = "エラー: " + err.message;
        msgAlert.className = "alert alert-danger alert-custom";
        setTimeout(resetSystem, 4000);
      }

      function resetSystem() {
        isScanning = false;
        videoArea.style.display = "none";
        placeholder.style.display = "flex";
        btnCancel.style.display = "none";
        document.getElementById("btn-in").disabled = false;
        document.getElementById("btn-out").disabled = false;
        statusInd.innerHTML = '<i class="bi bi-hand-index-thumb"></i> 待機中';
        msgAlert.className = "alert alert-secondary alert-custom";
        msgAlert.innerText = "操作を選択してください";
        if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
      }
    </script>
  </body>
</html>
